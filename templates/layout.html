<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINI WALLET Lab</title>
    <!-- フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/destyle.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
    </div>

    <header>
      <div class="top">
        <a href="/"
          ><p class="storeName">
            <span class="upperCase">mini wallet l</span>ab
          </p></a
        >

        <nav>
          <div class="menu1">
            <form action="/search" method="get" class="searchBox invisible">
              <input
                type="text"
                id="search_text"
                name="search_text"
                class="searchInput"
              />
              <button type="submit">商品検索</button>
            </form>
            <div class="search" onclick="toggleInvisible()">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z"
                    stroke="#ffffff"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </g>
              </svg>
            </div>
            <a href="{{url_for('cart.cart')}}"
              ><div class="cart">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g
                    id="SVGRepo_tracerCarrier"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M6.29977 5H21L19 12H7.37671M20 16H8L6 3H3M9 20C9 20.5523 8.55228 21 8 21C7.44772 21 7 20.5523 7 20C7 19.4477 7.44772 19 8 19C8.55228 19 9 19.4477 9 20ZM20 20C20 20.5523 19.5523 21 19 21C18.4477 21 18 20.5523 18 20C18 19.4477 18.4477 19 19 19C19.5523 19 20 19.4477 20 20Z"
                      stroke="#ffffff"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </g>
                </svg></div
            ></a>
            <a href="{{url_for('mypage.mypage')}}"
              ><div class="mypage">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g
                    id="SVGRepo_tracerCarrier"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z"
                      stroke="#ffffff"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                    <path
                      d="M12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z"
                      stroke="#ffffff"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </g>
                </svg></div
            ></a>
          </div>
          <div class="menu2">
            {% if user_id != None %}
            <!-- <p>ログイン： {{ user_name }} 様</p> -->
            <!-- postはformしかダメ。getならaタグでOK -->
            <form action="/logout" method="post">
              <button type="submit" name="btn" value="logout">
                ログアウト
              </button>
            </form>
            {% else %}
            <!-- <p>ゲスト 様</p>
                        <p>ログインしていません</p> -->
            <form action="/login" method="get">
              <button type="submit" name="btn" value="login">ログイン</button>
            </form>
            {% endif %}
            <form action="/admin_login" method="get">
              <button type="submit" name="btn" value="admin_login">
                管理者ログイン
              </button>
            </form>
          </div>
        </nav>
      </div>

      <div class="bottom">
        <nav>
          <ul class="menu3 upperCase">
            <li><a href="/">home</a></li>
            <li><a href="{{url_for('products.products')}}">products</a></li>
            <!-- app.py の @app.route の下にある products という関数を url_for に指定すると、
                    その関数を持つ @app.route にルーティングしてくれる。 -->
            <li><a href="{{url_for('pages.about')}}">about</a></li>
            <li><a href="{{url_for('pages.news')}}">news</a></li>
            <li><a href="{{url_for('pages.store')}}">store</a></li>
          </ul>
        </nav>
      </div>
    </header>

    {% block content %} {% endblock %}

    <footer>
      <div class="fotterMenu">
        <div class="menuArea">
          <div class="menu1">
            <ul>
              <li>お買い物ガイド</li>
              <li>特定商取引法について</li>
              <li>ご利用規約</li>
              <li>プライバシーポリシー</li>
            </ul>
          </div>
          <div class="menu2">
            <ul>
              <li>会社概要</li>
              <li>お問い合わせ</li>
            </ul>
          </div>
        </div>

        <div class="snsArea">
          <div class="x">
            <p>X</p>
          </div>
          <div class="facebook">
            <svg
              viewBox="-5 0 20 20"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              fill="#ffffff"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <title>facebook [#176]</title>
                <desc>Created with Sketch.</desc>
                <defs></defs>
                <g
                  id="Page-1"
                  stroke="none"
                  stroke-width="1"
                  fill="none"
                  fill-rule="evenodd"
                >
                  <g
                    id="Dribbble-Light-Preview"
                    transform="translate(-385.000000, -7399.000000)"
                    fill="#ffffff"
                  >
                    <g id="icons" transform="translate(56.000000, 160.000000)">
                      <path
                        d="M335.821282,7259 L335.821282,7250 L338.553693,7250 L339,7246 L335.821282,7246 L335.821282,7244.052 C335.821282,7243.022 335.847593,7242 337.286884,7242 L338.744689,7242 L338.744689,7239.14 C338.744689,7239.097 337.492497,7239 336.225687,7239 C333.580004,7239 331.923407,7240.657 331.923407,7243.7 L331.923407,7246 L329,7246 L329,7250 L331.923407,7250 L331.923407,7259 L335.821282,7259 Z"
                        id="facebook-[#176]"
                      ></path>
                    </g>
                  </g>
                </g>
              </g>
            </svg>
          </div>
          <div class="instagram">
            <svg
              viewBox="0 0 192 192"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  stroke="#ffffff"
                  stroke-width="12"
                  d="M96 162c-14.152 0-24.336-.007-32.276-.777-7.849-.761-12.87-2.223-16.877-4.741a36 36 0 0 1-11.33-11.329c-2.517-4.007-3.98-9.028-4.74-16.877C30.007 120.336 30 110.152 30 96c0-14.152.007-24.336.777-32.276.76-7.849 2.223-12.87 4.74-16.877a36 36 0 0 1 11.33-11.33c4.007-2.517 9.028-3.98 16.877-4.74C71.663 30.007 81.847 30 96 30c14.152 0 24.336.007 32.276.777 7.849.76 12.87 2.223 16.877 4.74a36 36 0 0 1 11.329 11.33c2.518 4.007 3.98 9.028 4.741 16.877.77 7.94.777 18.124.777 32.276 0 14.152-.007 24.336-.777 32.276-.761 7.849-2.223 12.87-4.741 16.877a36 36 0 0 1-11.329 11.329c-4.007 2.518-9.028 3.98-16.877 4.741-7.94.77-18.124.777-32.276.777Z"
                ></path>
                <circle
                  cx="96"
                  cy="96"
                  r="30"
                  stroke="#ffffff"
                  stroke-width="12"
                ></circle>
                <circle cx="135" cy="57" r="9" fill="#ffffff"></circle>
              </g>
            </svg>
          </div>
        </div>
      </div>

      <small>©<span class="upperCase">mini wallet l</span>ab 2026</small>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
