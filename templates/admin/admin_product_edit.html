{% extends "admin/admin_layout.html" %}
{% block content %}

<main>
  <h1>商品登録</h1>

  <div>
    <button onclick="history.back()">戻る</button>
  </div>

  <form action="" method="post">

    <div>
      <table>
        <tr>
          <th>商品ID</th>
          <td><p>{{ product.id }}</p></td>
        </tr>
        <tr>
          <th>商品名</th>
          <td><input type="text" name="name" value="{{ product.name }}"></td>
        </tr>
        <tr>
          <th>価格</th>
          <td><input type="number" name="price" value="{{ product.price }}"></td>
        </tr>
        <tr>
          <th>シリーズ</th>
          <td>
            <select name="series" id="series">
              <option value="1" {% if product.series_id == 1 %}selected{% endif %}>Just Day</option>
              <option value="2" {% if product.series_id == 2 %}selected{% endif %}>Someday</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>カラー</th>
          <td>
            <select name="color" id="color">
              <option value="1" {% if product.color_id == 1 %}selected{% endif %}>Yellow</option>
              <option value="2" {% if product.color_id == 2 %}selected{% endif %}>Pink</option>
              <option value="3" {% if product.color_id == 3 %}selected{% endif %}>Blue</option>
              <option value="4" {% if product.color_id == 4 %}selected{% endif %}>Purple</option>
              <option value="5" {% if product.color_id == 5 %}selected{% endif %}>Green</option>
              <option value="6" {% if product.color_id == 6 %}selected{% endif %}>Black</option>
              <option value="7" {% if product.color_id == 7 %}selected{% endif %}>Brown</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>カラー（詳細）</th>
          <td><input type="text" name="colorDetail" value="{{ product.color_detail }}"></td>
        </tr>
        <tr>
          <th>商品説明</th>
          <td><textarea name="caption">{{ product.caption }}</textarea></td>
        </tr>
        <tr>
          <th>在庫数</th>
          <td><input type="number" name="stock" value="{{ product.stock }}"></td>
        </tr>
        <tr>
          <th>商品画像</th>
          <td><img src="{{ url_for('static', filename=product.image_path) }}" alt="現在の商品画像"></td>
        </tr>
        <tr>
          <th>画像を変更</th>
          <td><input type="file" name="imgFile"></td>
        </tr>
        <tr>
          <th>検索キーワード</th>
          <td><textarea name="searchKey">{{ product.search_key }}</textarea></td>
        </tr>
        <tr>
          <th>状態</th>
          <td>
            <select name="isActive" id="isActive">
              <option value="0" {% if product.is_active == 0 %}selected{% endif %}>非公開</option>
              <option value="1" {% if product.is_active == 1 %}selected{% endif %}>公開</option>
            </select>
          </td>
        </tr>
      </table>
    </div>

    <div>
      <button type="submit">変更</button>
    </div>

  </form>
  
</main>

{% endblock %}
