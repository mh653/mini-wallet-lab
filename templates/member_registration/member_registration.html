{% extends "index.html" %}

{% block content %}
    <main>
    <h1>新規会員登録</h1>

        <form action="/member_registration_success" method="post">
            <p>
                <label for="mail">メールアドレス：</label>
                <input type="mail" id="mail" name="mail" required>
            </p>
            <p>
                <label for="name">氏名：</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="birthday">生年月日：</label>
                <input type="date" id="birthday" name="birthday" required>
            </p>
            <p>
                性別：
                <input type="radio" id="man" name="gender" value="1">
                <label for="man">男性</label>
                <input type="radio" id="woman" name="gender" value="2">
                <label for="woman">女性</label>
                <input type="radio" id="other" name="gender" value="3">
                <label for="other">その他（回答しない）</label>
            </p>
            <p>
                <label for="tel">電話番号：</label>
                <input type="tel" id="tel" name="tel" required>
            </p>
            <p>
                <label for="zip">郵便番号：</label>
                <input type="text" id="zip" name="zip" required>
            </p>
            <p>
                <label for="address">住所：</label>
                <input type="text" id="address" name="address1" required>
            </p>
            <p>
                <input type="text" id="address2" name="address2" required placeholder="番地">
            </p>
            <p>
                <input type="text" id="address3" name="address3" placeholder="マンション名以下（任意）">
            </p>
            <p>
                <label for="pass">パスワード：</label>
                <input type="password" id="pass" name="pass" required>
            </p>
            <p>
                <label for="pass_confirm">パスワード（確認用）：</label>
                <input type="password" id="pass_confirm" name="pass_confirm" required>
            </p>
            <p>
                メールマガジン
                <input type="radio" id="yes" name="m_flag" value="1" checked>
                <label for="yes">受信する</label>
                <input type="radio" id="no" name="m_flag" value="0">
                <label for="no">受信しない</label>
            </p>

            <p>
                <button type="submit" name="btn" value="login">登録する</button>
            </p>
        </form>

    </main>
{% endblock %}
